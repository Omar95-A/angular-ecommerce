<div class="card">
    <p-dataView #dv [value]="cartProducts">
        <ng-template pTemplate="list" let-products>
            <div class="grid grid-nogutter">
                @for (item of cartProducts; track $index; let first = $first) {
                    <div class="col-12"  class="col-12">
                        <div class="flex flex-column sm:flex-row sm:align-items-center p-4 gap-3" [ngClass]="{ 'border-top-1 surface-border': !first }">
                            <div class="md:w-10rem relative">
                                <img class="block xl:block mx-auto border-round w-full" [src]="'https://primefaces.org/cdn/primeng/images/demo/product/'+item.prodImg"  [alt]="item.name" />
                                <!-- <p-tag  [style.left.px]="4" [style.top.px]="4" /> -->
                            </div>
                            <div class="flex flex-column md:flex-row justify-content-between md:align-items-center flex-1 gap-4">
                                <div class="flex flex-row md:flex-column justify-content-between align-items-start gap-2">
                                    <div>
                                        <span class="font-medium text-secondary text-sm">{{ item.prodCategory }}</span>
                                        <div class="text-lg font-medium mt-2 gray-900 prodTitle">{{ item.prodTitle }}</div>
                                    </div>
                                    <div class="surface-100 p-1" style="border-radius: 30px starItem">
                                        <div class="surface-0 flex align-items-center gap-2 justify-content-center py-1 px-2 starI" style="border-radius: 30px; box-shadow: 0px 1px 2px 0px rgba(0, 0, 0, 0.04), 0px 1px 2px 0px rgba(0, 0, 0, 0.06)">
                                            <span class="text-900 font-medium text-sm"> 5 </span>
                                            <i class="pi pi-star-fill text-yellow-500 staricon"></i>
                                        </div>
                                    </div>
                                </div>
                                <div class="flex flex-column md:align-items-end gap-5">
                                    <span class="text-xl font-semibold text-900">{{ '$' + item.prodPrice }}</span>
                                    <div class="flex flex-row-reverse md:flex-row gap-2">

                                        <p-button icon="pi pi-heart" [outlined]="true" />
                                        <div class="btn-box">
                                            <p-button icon="pi pi-shopping-cart" class="flex-auto md:flex-initial white-space-nowrap ak-btn" label="Buy Now" iconPos="right"/>
                                            <p-button (click)="markAsRemoveFromCart(item);removeFromCart(item);$event.stopPropagation()" label="REMOVE" severity="danger" styleClass="" icon="pi pi-cart-minus" iconPos="right"/> 
                                        </div>

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                }
            </div>
        </ng-template>

    </p-dataView>
</div>
